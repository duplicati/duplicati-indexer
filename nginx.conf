events {
    worker_connections 1024;
}

http {
    upstream llama_cluster {
        # All vectors natively hit the Massive internal Parallel Node dynamically organically handled in GPU Memory!
        server host.docker.internal:8181;
        
        # Rigorously lock 256 pipeline sockets entirely natively open permanently functionally!
        keepalive 256;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://llama_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Formally organically statically inject internal Native TCP Socket Lock structurally!
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Allow high proxy buffering for massive AI JSON responses
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
            
            # Massive timeout for gigantic backend loads to avoid disconnecting during vector crunching
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
    }
}
