services:
  indexer:
    build:
      context: .
      dockerfile: Indexer/Dockerfile
    container_name: duplicati-indexer
    depends_on:
      surrealdb:
        condition: service_started
      unstructured:
        condition: service_started
      ollama:
        condition: service_healthy
      llamacpp-balancer:
        condition: service_started
    environment:
      - DOTNET_ENVIRONMENT=${DOTNET_ENVIRONMENT:-Production}
      - LOGGING__LOGLEVEL__DEFAULT=${LOG_LEVEL:-Information}
      - CONNECTIONSTRINGS__DOCUMENTSTORE=Server=http://surrealdb:8000;Namespace=test;Database=test;Username=root;Password=root
      - UNSTRUCTURED__BASEURL=http://unstructured:8000
      - OLLAMAEMBED__BASEURL=http://ollama:11434
      - OLLAMAEMBED__MODEL=${OLLAMAEMBED_MODEL:-nomic-embed-text}
      - LLM__PROVIDER=${LLM_PROVIDER:-Gemini}
      - EMBED__PROVIDER=${EMBED_PROVIDER:-ollama}
      - LMSTUDIO__BASEURL=${LMSTUDIO_BASEURL:-http://host.docker.internal:1234/v1}
      - LMSTUDIO__MODEL=${LMSTUDIO_MODEL:-local-model}
      - LMSTUDIO__EMBEDMODEL=${LMSTUDIO_EMBEDMODEL:-text-embedding-nomic-embed-text-v1.5}
      - OLLAMALLM__BASEURL=http://ollama-llm:11434
      - OLLAMALLM__MODEL=${OLLAMALLM_MODEL:-llama3.2}
      - GEMINI__APIKEY=${GEMINI_API_KEY:-}
      - GEMINI__MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - CHATGPT__APIKEY=${CHATGPT_API_KEY:-}
      - CHATGPT__MODEL=${CHATGPT_MODEL:-gpt-4o-mini}
      - CLAUDE__APIKEY=${CLAUDE_API_KEY:-}
      - CLAUDE__MODEL=${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}
      - CLAUDE__MAXTOKENS=${CLAUDE_MAX_TOKENS:-1024}
      - INDEXING__MAXFILESIZEBYTES=${MAX_FILE_SIZE:-104857600}
      - INDEXING__FILEEXTENSIONFILTER=!.,.txt
      - INDEXING__PROVIDER=${INDEXING_PROVIDER:-unstructured}
      - MARKITDOWN__EXECUTABLEPATH=${MARKITDOWN_EXECUTABLEPATH:-markitdown}
      - CHUNKING__MAXCHUNKSIZE=${CHUNKING_MAX_SIZE:-512}
      - CHUNKING__OVERLAPSIZE=${CHUNKING_OVERLAP:-50}
      - CHUNKING__CHARSPERTOKEN=${CHUNKING_CHARS_PER_TOKEN:-1.5}
      - RAGQUERY__VERSION=${RAGQUERY_VERSION:-v2}
      - SECURITY__THREATMONITOR=${SECURITY_THREATMONITOR:-noop}
    ports:
      - "8081:8080"
    volumes:
      - ./data/indexer:/app/data
      - ./testdata/backupdest:/backupdest
    restart: unless-stopped

  frontend:
    image: node:24
    container_name: indexer-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      indexer:
        condition: service_started
    command: /bin/sh -c "npm install && (npm run watch:font &) && npx ng serve --host 0.0.0.0 --port 4200 --poll 2000 --proxy-config proxy.conf.docker.json"
    ports:
      - "3000:4200"
    restart: unless-stopped

  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: indexer-surrealdb
    ports:
      - "8000:8000"
    command: start --user root --pass root --bind 0.0.0.0:8000 file:/data/surreal.db
    volumes:
      - ./data/surrealdb:/data
    restart: unless-stopped


  unstructured:
    image: quay.io/unstructured-io/unstructured-api:latest
    container_name: indexer-unstructured
    environment:
      - UNSTRUCTURED_MEMORY_FREE_MINIMUM_MB=100
    ports:
      - "8002:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: indexer-ollama
    environment:
      - OLLAMA_NUM_PARALLEL=10
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q4_0
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama serve & sleep 5 && ollama pull nomic-embed-text && wait"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q nomic-embed-text || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 120s
  llamacpp-balancer:
    image: nginx:alpine
    container_name: indexer-llamacpp-balancer
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
  # Local LLM service for chat models
  # Supports any model via local:<model> format in LLM_PROVIDER
  ollama-llm:
    image: ollama/ollama:latest
    container_name: indexer-ollama-llm
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-}
    ports:
      - "11435:11434"
    volumes:
      - ./data/ollama-llm:/root/.ollama
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: |
      'case "$$LLM_PROVIDER" in
        local:*) MODEL="$${LLM_PROVIDER#local:}"; echo "Starting Ollama LLM service with model: $$MODEL"; ollama serve & sleep 10 && ollama pull "$$MODEL" && wait ;;
        ollama) echo "Starting Ollama LLM service with default model"; ollama serve & sleep 10 && ollama pull "$${OLLAMALLM_MODEL:-llama3.2}" && wait ;;
        *) echo "LLM_PROVIDER is $$LLM_PROVIDER (not a local model). Exiting."; exit 0 ;;
      esac'
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -qv 'NAME' || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 180s
